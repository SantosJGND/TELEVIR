  tools:
    kallisto:
      url: "https://github.com/pachterlab/kallisto/releases/download/v0.43.1/kallisto_linux-v0.43.1.tar.gz"
      description: "Kallisto RNA-seq quantifier"
      file: "kallisto_linux-v0.43.1.tar.gz"
      version: "0.43.1"

  ncbi_eutils:
    esearch:
      url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
      description: "NCBI E-utilities ESearch endpoint"

    efetch:
      url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi"
      description: "NCBI E-utilities EFetch endpoint"

    elink:
      url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/elink.fcgi"
